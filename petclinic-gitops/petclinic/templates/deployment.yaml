apiVersion: apps/v1
kind: Deployment

metadata:
  name: petclinic

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: petclinic

  template:
    metadata:
      labels:
        app: petclinic

    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
      - name: petclinic

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - containerPort: 8080

        resources:
{{ toYaml .Values.resources | indent 10 }}
