{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: petclinic-ingress

spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:
  - host: {{ .Values.ingress.host }}

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: petclinic-service

            port:
              number: 80

{{- end }}